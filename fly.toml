# Fly.io config for the VibeRate hosted server.
# `app` must be globally unique on Fly — change it (and the *.fly.dev URL follows)
# if "viberate" is taken. `fra` (Frankfurt) is the closest region to Tel Aviv.
app = "vbrt"
primary_region = "fra"

[build]

[env]
  PORT = "8080"
  # Projects are JSON files under here; the volume below makes them durable.
  VBRT_DATA_DIR = "/data"
  # Multi-tenant mode: public landing at /, token-scoped dashboard at /app,
  # no anonymous enumeration of the project list.
  VBRT_HOSTED = "1"
  # Drive (the RCE control plane) is gated to these signed-in accounts. Not a
  # secret (emails aren't sensitive); deny-by-default if empty. See agentRoutes.js.
  VBRT_ADMIN_EMAILS = "mperkins1995@gmail.com"
  # Where driven agents work — a dedicated dir on the volume, never /app (the
  # running server's own source) or /data (the project store).
  VBRT_AGENT_CWD = "/data/drive"
  # The container runs as root, and Claude Code refuses --dangerously-skip-
  # permissions (our bypassPermissions mode) as root unless it knows it's in a
  # sandbox. A Fly firecracker VM IS that sandbox boundary, so this is legit.
  # Fly-only: local `vbrt serve` runs as the user and must NOT set this.
  IS_SANDBOX = "1"

# Persistent volume for the file-based project store. The source name must match
# the volume you create (`fly volumes create viberate_data ...`). One machine
# only — a volume can't be shared across machines, so don't scale past 1.
[mounts]
  source = "viberate_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Drive holds interactive agent state in memory (the session map, the resume
  # ids), so the machine must NOT scale to zero mid-conversation. Keep one always
  # running. (Drop back to "stop"/0 if you ever run share-only without Drive.)
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  # 512mb is fine for share-only, but a spawned `claude` turn is a heavy Node
  # process — bumped so Drive turns don't OOM. Raise to 2048mb if you see OOMs.
  memory = "1024mb"
