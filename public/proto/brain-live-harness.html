<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>live brain — integration harness</title>
<link rel="stylesheet" href="../style.css" />
<style>
  body { padding: 24px; }
  .dv-wrap { max-width: 760px; margin: 0 auto; min-height: auto; }
  .note { color: var(--muted); font-size: 12px; margin: 0 28px 12px; }
</style>
</head>
<body class="view-project">
  <div class="dv-wrap">
    <p class="note">Harness — runs the <b>real</b> <code>liveBrain</code> module sliced out of <code>/app.js</code> (markup from <code>liveBrain.panel()</code>), fed synthetic tool_use events. Not the shipped page.</p>
    <div class="dashboard"><div id="brain-host"></div></div>
  </div>

<script>
// Representative brain doc graph (same shape buildDocGraph produces).
window.state = {
  docGraph: { nodes: [
    { name: 'SOUL.md',    base: 'SOUL.md',    role: 'constitution', completion: null, archived: false },
    { name: 'CLAUDE.md',  base: 'CLAUDE.md',  role: 'constitution', completion: null, archived: false },
    { name: 'SEED.md',    base: 'SEED.md',    role: 'constitution', completion: null, archived: false },
    { name: 'MEMORY.md',  base: 'MEMORY.md',  role: 'memory',       completion: null, archived: false },
    { name: 'ROADMAP.md', base: 'ROADMAP.md', role: 'reference',    completion: null, archived: false },
    { name: 'PLAN_MOBILE.md',           base: 'PLAN_MOBILE.md',           role: 'reference', completion: { done: 3, total: 8 }, archived: false },
    { name: 'PLAN_DRIVE_WORKSPACES.md', base: 'PLAN_DRIVE_WORKSPACES.md', role: 'reference', completion: { done: 2, total: 5 }, archived: false },
  ] },
  _driveBrainOpen: true,
};

(async () => {
  // Slice the real liveBrain IIFE out of app.js (stable comment + assignment markers)
  // so this harness exercises shipped code, not a copy.
  const src = await fetch('../app.js').then((r) => r.text());
  const start = src.indexOf('const liveBrain = (() => {');
  const end = src.indexOf('window.liveBrain = liveBrain;');
  if (start < 0 || end < 0) { document.querySelector('.note').textContent = 'Could not locate liveBrain in /app.js'; return; }
  const mod = src.slice(start, end) + '\nreturn liveBrain;';
  const liveBrain = new Function('state', mod)(window.state);

  const host = document.getElementById('brain-host');
  host.innerHTML = liveBrain.panel();
  liveBrain.attach(host);

  // Drive a realistic turn: reads, edits, a bash run, a plan tick, ephemeral churn.
  const SCRIPT = [
    [400, 'Read', 'CLAUDE.md'],
    [700, 'Read', 'PLAN_MOBILE.md'],
    [600, 'Read', 'public/app.js'],
    [500, 'Read', 'public/style.css'],
    [700, 'Edit', 'public/app.js'],
    [600, 'Bash', 'npm test'],
    [700, 'Edit', 'public/style.css'],
    [600, 'TodoWrite', 'PLAN_MOBILE.md'],
    [700, 'Read', 'src/server.js'],
    [700, 'Edit', 'src/agent.js'],
    [600, 'Write', 'NOTES_LIVE_BRAIN.md'],
    [700, 'Edit', 'public/app.js'],
    [600, 'Bash', 'node smoke.js'],
    [700, 'Read', 'src/driveIngest.js'],
    [700, 'Edit', 'src/driveIngest.js'],
  ];
  let t = 0;
  for (const [d, name, file] of SCRIPT) { t += d; setTimeout(() => liveBrain.feed(name, file), t); }
  setTimeout(() => liveBrain.idle(), t + 1200);
})();
</script>
</body>
</html>
