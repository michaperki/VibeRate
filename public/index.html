<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VibeRate</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header class="brand" id="brand" title="Back to workspace">
          <span class="logo">★</span>
          <div>
            <div class="brand-title">VibeRate</div>
            <div class="brand-sub">⌂ workspace</div>
          </div>
        </header>
        <div id="projects" class="list"></div>
      </aside>

      <main id="main">
        <section id="home" class="pane"></section>
        <section id="sessions" class="pane">
          <div class="empty">Pick a project on the left.</div>
        </section>
        <section id="conversation" class="pane">
          <div class="empty">Pick a session to read.</div>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
