# XcodeGen spec — the single source of truth for the native VibeRate iOS app.
#
# The agent authors this YAML + the Swift sources from the Linux Drive box (which has
# no Xcode). The Xcode project itself is GENERATED on the Codemagic cloud Mac at build
# time (`xcodegen generate`), exactly the way the old Capacitor workflow ran
# `cap add ios`. So VibeRate.xcodeproj is NOT committed — it's a build artifact (see
# .gitignore). Locally, with a Mac: `brew install xcodegen && xcodegen generate && open VibeRate.xcodeproj`.

name: VibeRate
options:
  bundleIdPrefix: com.viberate
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    # Must be >= the Capacitor builds' marketing version (1.0) or TestFlight treats
    # the native build as OLDER and won't offer it as an update on the phone.
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "1"   # CI bumps this above the latest TestFlight build
    SWIFT_VERSION: "5.9"

targets:
  App:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: VibeRate
        PRODUCT_BUNDLE_IDENTIFIER: com.viberate.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Support/Info.plist
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: VibeRate
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # VibeRate only uses standard HTTPS/TLS (exempt) — declare it so App Store
        # Connect doesn't flag the build "Missing Compliance" (see codemagic.yaml).
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Custom URL scheme that catches the OAuth deep-link return (viberate://auth).
        CFBundleURLTypes:
          - CFBundleURLName: com.viberate.app
            CFBundleURLSchemes:
              - viberate
