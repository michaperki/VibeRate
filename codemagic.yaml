# Codemagic CI/CD — builds the Capacitor iOS shell on a cloud Mac and ships to TestFlight.
# You never need your own Mac: this runs on Codemagic's macOS M2 instances.
#
# BEFORE THIS WILL BUILD, do the one-time setup in PLAN_CAPACITOR.md ("What only you can do"):
#   1. Register the bundle id  com.viberate.app  in your Apple Developer account.
#   2. In Codemagic: Teams > Integrations > App Store Connect, add an API key named `VibeRateASC`.
#   3. Connect this repo in Codemagic and run the `ios-release` workflow.
# The free tier (500 macOS min/mo) covers ~25-50 builds — far more than you'll use.

workflows:
  ios-release:
    name: VibeRate iOS (Capacitor → TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: VibeRateASC   # name of the API key you add in the Codemagic UI
    environment:
      groups:
        - ios_signing   # holds the secure CERTIFICATE_PRIVATE_KEY var (added in Codemagic UI)
      vars:
        BUNDLE_ID: "com.viberate.app"
        XCODE_PROJECT: "ios/App/App.xcodeproj"   # Capacitor 8 = SPM, no .xcworkspace
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "6782960153"   # VibeRate IDE, App Store Connect numeric Apple ID
      node: 22          # Capacitor 8 CLI requires Node >=22 (independent of the server's Node 20)
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Generate the native iOS project (Capacitor)
        script: |
          set -e
          npx cap add ios
          npx cap sync ios
          # Capacitor 8 uses Swift Package Manager, not CocoaPods: plugins are
          # wired via Package.swift, so there is no Podfile or .xcworkspace.
          # We build App.xcodeproj directly; xcodebuild resolves SPM deps itself.
          echo "=== ios/App contents (expect App.xcodeproj, no workspace) ==="
          ls -la ios/App
      - name: Generate app icons & splash (only if you've added assets/icon.png)
        script: |
          if [ -f "assets/icon.png" ]; then npx capacitor-assets generate --ios; else echo "No assets/icon.png yet — using default icon. See PLAN_CAPACITOR.md."; fi
      - name: Set up code signing (creates distribution cert + profile if missing)
        script: |
          set -e
          # The app_store_connect integration injects APP_STORE_CONNECT_* env vars
          # that these CLI tools read automatically. --create makes the cert/profile
          # on first run instead of expecting them to already exist.
          # Diagnostic: confirm the integration actually injected API credentials.
          # Prints presence + lengths only — never the secret values.
          echo "ISSUER_ID:  present=${APP_STORE_CONNECT_ISSUER_ID:+yes} len=${#APP_STORE_CONNECT_ISSUER_ID}"
          echo "KEY_ID:     present=${APP_STORE_CONNECT_KEY_IDENTIFIER:+yes} len=${#APP_STORE_CONNECT_KEY_IDENTIFIER}"
          echo "API_KEY:    present=${APP_STORE_CONNECT_PRIVATE_KEY:+yes} len=${#APP_STORE_CONNECT_PRIVATE_KEY}"
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          # Capacitor doesn't reliably stamp the bundle id from appId, so the target
          # may still be a default (com.example.app). Force it to match the profile
          # we just created, otherwise use-profiles has nothing to map -> archive
          # fails with "requires a provisioning profile". (BSD sed needs -i '').
          echo "=== bundle id before fix ==="
          grep -m3 PRODUCT_BUNDLE_IDENTIFIER ios/App/App.xcodeproj/project.pbxproj || true
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" \
            ios/App/App.xcodeproj/project.pbxproj
          echo "=== bundle id after fix ==="
          grep -m3 PRODUCT_BUNDLE_IDENTIFIER ios/App/App.xcodeproj/project.pbxproj || true
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Publish DIRECTLY to an internal beta group — no TestFlight beta review.
        #
        # Do NOT set `submit_to_testflight: true` here. Combining it with beta_groups
        # routes the build through *external* beta review, which Apple gates on
        # "complete test information" (Beta App Information feedback email + Beta App
        # Review contact name/phone/email). That is what failed the first publish.
        # Omitting it uses the direct internal-group assignment path (Codemagic CLI,
        # June 2024+), which needs none of that. Internal testers get the build as
        # soon as Apple finishes processing — no review wait, no test info.
        #
        # ONE-TIME, on your side (the agent can't touch App Store Connect): in
        # App Store Connect > your app > TestFlight, create an **internal** group
        # named EXACTLY "Internal Testers", set its distribution to **Manual**
        # (turn OFF "Automatically distribute builds" — automatic groups reject the
        # manual assignment Codemagic does), and add yourself as a tester. Until that
        # group exists this step fails with "Cannot find Beta group". See PLAN_CAPACITOR.md.
        beta_groups:
          - "Internal Testers"
